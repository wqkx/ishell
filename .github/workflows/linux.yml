name: Linux Build

# 在 GitHub 的 Ubuntu runner 上编译 + 跑测试，产出 Linux 可执行文件。
# 触发：push/PR 到 main，手动运行，或推送 v* 标签。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: System deps (egui/winit/wayland)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libgl1-mesa-dev libwayland-dev pkg-config

      # 项目内的 .cargo/config.toml 指向国内 rsproxy 镜像，CI 上用官方源即可
      - name: Use crates.io (drop China mirror)
        run: rm -f .cargo/config.toml

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ishell-linux-x86_64
          path: target/release/ishell
