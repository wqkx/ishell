name: macOS Build

# 在 GitHub 的 macOS runner 上编译出 macOS 可执行文件（Apple Silicon + Intel）。
# 触发：手动运行（Actions 页面 Run workflow），或推送 v* 标签。
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin   # Apple Silicon (M 系列)
          - x86_64-apple-darwin    # Intel Mac
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 项目内的 .cargo/config.toml 指向国内 rsproxy 镜像，CI 上用官方源即可
      - name: Use crates.io (drop China mirror)
        run: rm -f .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ishell-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ishell
