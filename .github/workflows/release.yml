name: Release

# 推送 v* 标签时：构建 Linux / macOS(arm+intel) / Windows，并发布到 GitHub Release。
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: "",     asset: ishell-linux-x86_64 }
          - { os: macos-14,       target: aarch64-apple-darwin,     ext: "",     asset: ishell-macos-aarch64 }
          - { os: macos-14,       target: x86_64-apple-darwin,      ext: "",     asset: ishell-macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: ".exe", asset: ishell-windows-x86_64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libgl1-mesa-dev libwayland-dev pkg-config

      - name: Use crates.io (drop China mirror)
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/ishell${{ matrix.ext }}" "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
