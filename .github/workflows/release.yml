name: Release

# 推送 v* 标签时：构建 Linux / macOS(arm+intel) / Windows，并发布到 GitHub Release。
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build:
    # 网络韧性：禁用 cargo 的 HTTP/2 多路复用（规避 "HTTP2 framing layer" 报错），并多重试
    env:
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          # 钉死 22.04（glibc 2.35）而非 ubuntu-latest（24.04=glibc 2.39），
          # 否则二进制要求 glibc≥2.39，在老发行版上报 "GLIBC_2.39 not found"
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, ext: "",     asset: ishell-linux-x86_64 }
          - { os: macos-14,       target: aarch64-apple-darwin,     ext: "",     asset: ishell-macos-aarch64 }
          - { os: macos-14,       target: x86_64-apple-darwin,      ext: "",     asset: ishell-macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: ".exe", asset: ishell-windows-x86_64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libgl1-mesa-dev libwayland-dev pkg-config

      - name: Use crates.io (drop China mirror)
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/ishell${{ matrix.ext }}" "${{ matrix.asset }}"

      # Linux：打包 二进制 + 图标 + .desktop + 安装脚本，使其在应用菜单显示 logo。
      # 裸二进制仍单独保留供 CLI 使用。
      - name: Bundle Linux tarball
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          # 包内目录用 iShell（解压后即 iShell/），避免与同名裸二进制文件冲突
          PKG="iShell"
          mkdir -p "$PKG"
          cp "target/${{ matrix.target }}/release/ishell" "$PKG/ishell"
          chmod +x "$PKG/ishell"
          cp assets/icon.png "$PKG/ishell.png"
          cp assets/linux/ishell.desktop "$PKG/ishell.desktop"
          cp assets/linux/install.sh "$PKG/install.sh"
          chmod +x "$PKG/install.sh"
          tar czf "${{ matrix.asset }}.tar.gz" "$PKG"

      - name: Upload Linux tarball
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: ${{ matrix.asset }}.tar.gz

      # macOS：把裸二进制打包成带图标的 .app，使其在「访达 / 启动台」显示 logo 并可正常启动。
      # .app 是目录，用 ditto 压成单文件上传（保留结构与权限）。同时保留裸二进制供 CLI 使用。
      - name: Bundle macOS .app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -e
          APP="iShell.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/${{ matrix.target }}/release/ishell" "$APP/Contents/MacOS/ishell"
          chmod +x "$APP/Contents/MacOS/ishell"
          # 由带透明留白的 1024px PNG 生成多尺寸 icns（图标占画布 ~80%，与 macOS
          # 其它应用图标观感同大小，不会大一圈）
          SRC=assets/macos/icon.png
          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s "$SRC" --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
            d=$((s*2)); sips -z $d $d "$SRC" --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"
          # 版本号取自 tag（去掉前缀 v）；非法/缺失时回退
          VER="${GITHUB_REF_NAME#v}"; case "$VER" in ""|*[!0-9.]*) VER="0.0.0";; esac
          sed "s/__VERSION__/$VER/g" assets/macos/Info.plist > "$APP/Contents/Info.plist"
          ditto -c -k --keepParent "$APP" "${{ matrix.asset }}.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Upload macOS .app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.app.zip
          path: ${{ matrix.asset }}.app.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
